<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css" />
  </head>

  <body>
    <header>
      <!--logo + navigation НУЖНО БУДЕТ ПОМЕНЯТЬ ЛОГОТИП И КОРЗИНУ-->
      <div class="nav container">
        <div class="nav__left">
          <img src="../img/logo.svg" alt="logotip" />
        </div>
        <div class="nav__right">
          <img src="../img/menu.svg" alt="menu" />
          <img src="../img/account.svg" alt="account" />
          <img src="../img/trash.png" alt="trash" />
        </div>
      </div>
    </header>

    <!--content (intro + categories + why we + maps + button for order)-->
    <main>
      <!--intro (name + some information)-->
      <div class="intro">
        <div class="intro__info container">
          <div class="intro__text">
            <h1>POWER CONTROL</h1>
            <p>SOME HEALTHE FOOD</p>
          </div>
        </div>
      </div>

      <!--categories  !!! СМОТРЕТЬ КАК ТЕКСТ РАСПОЛОЖИТЬ НА КАРТИНКЕ-->
      <div class="categories container">
        <div class="categories__menu">
          <!--для худых, чтобы набрать вес-->
          <div class="categories__skinny">
            <img src="../img/woman.jpg" alt="skinny" />
            <p>для худых, чтобы набрать вес</p>
          </div>
          <!--для толстых, чтобы сбросить-->
          <div class="categories__fat">
            <img src="../img/man.jpg" alt="fat" />
            <p>для толстых, чтобы сбросить</p>
          </div>
          <!--для поддержание веса-->
          <div class="categories__normal">
            <img src="../img/kids.jpg" alt="normal" />
            <p>для поддержание веса</p>
          </div>
        </div>
        <!--вегатерианское меню-->
        <div class="categories__vegan">
          <img src="../img/acces.jpg" alt="vegan" />
          <p>вегатерианское меню</p>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
